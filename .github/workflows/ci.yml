name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: |
          cd ui && npm ci && npm run build
          cd .. && cp -r ui/build internal/server/ui

      - name: Build
        run: CGO_ENABLED=1 go build -o llmview .

      - name: Test
        run: go test ./... -race -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: |
          cp -r ui/build internal/server/ui 2>/dev/null || mkdir -p internal/server/ui && echo '<!doctype html>' > internal/server/ui/index.html
          go vet ./...
