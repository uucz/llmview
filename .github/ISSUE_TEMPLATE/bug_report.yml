name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Run `llmview`
        2. ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    attributes:
      label: llmview version
      description: Output of `llmview --version`
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Provider
      options:
        - OpenAI
        - Anthropic
        - Ollama
        - Other
    validations:
      required: false
  - type: input
    attributes:
      label: OS / Architecture
      description: e.g., macOS arm64, Linux amd64
    validations:
      required: true
